crds:
  enabled: true

grafana:
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password
  grafana.ini:
    dashboards:
      min_refresh_interval: 5s
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.127.0.0.1.nip.io
    path: /
    pathType: Prefix
  sidecar:
    dashboards:
      searchNamespace: ALL

alertmanager:
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - alertmanager.127.0.0.1.nip.io
    paths:
      - /
    pathType: Prefix

prometheusOperator:
  # Local Minikube stability: avoid HTTPS probe/cert edge-cases on operator pod.
  tls:
    enabled: false
  livenessProbe:
    initialDelaySeconds: 10
    timeoutSeconds: 5
  readinessProbe:
    initialDelaySeconds: 10
    timeoutSeconds: 5

prometheus:
  prometheusSpec:
    ruleSelectorNilUsesHelmValues: false
    ruleSelector: {}
    ruleNamespaceSelector: {}
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
