name: ci

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: player-data-service
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod
          cache: true

      - name: gofmt check
        run: |
          cd app
          UNFORMATTED="$(gofmt -l .)"
          if [ -n "$UNFORMATTED" ]; then
            echo "Not gofmt-formatted:" && echo "$UNFORMATTED" && exit 1
          fi

      - name: go test
        run: cd app && go test ./...

      - name: go test (race detector)
        run: cd app && go test -race ./...

  infra-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Render infra manifests (kustomize)
        run: |
          set -euo pipefail
          kubectl kustomize infra/apps/workloads/player-data-service/overlays/dev > /tmp/infra-workload-dev.yaml
          kubectl kustomize infra/apps/workloads/player-data-service/overlays/staging > /tmp/infra-workload-staging.yaml
          kubectl kustomize infra/apps/workloads/player-data-service/overlays/prod > /tmp/infra-workload-prod.yaml
          kubectl kustomize infra/apps/platform/policy-guardrails > /tmp/infra-policy-guardrails.yaml
          kubectl kustomize infra/clusters/local/argocd/applications > /tmp/infra-apps.yaml
          kubectl kustomize infra/clusters/local/argocd/install > /tmp/infra-bootstrap.yaml

      - name: Install kubeconform
        run: |
          set -euo pipefail
          KUBECONFORM_VERSION=v0.6.7
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C "$HOME/.local/bin" kubeconform
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate rendered manifests (kubeconform)
        run: |
          set -euo pipefail
          for f in /tmp/infra-workload-dev.yaml /tmp/infra-workload-staging.yaml /tmp/infra-workload-prod.yaml /tmp/infra-policy-guardrails.yaml /tmp/infra-apps.yaml /tmp/infra-bootstrap.yaml; do
            kubeconform -summary -strict -ignore-missing-schemas "$f"
          done

  push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [test, infra-validate]
    permissions:
      contents: read
      packages: write
    outputs:
      app_changed: ${{ steps.changes.outputs.app_changed }}
      image: ${{ steps.img.outputs.image_repo }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect app changes
        id: changes
        run: |
          set -euo pipefail
          ZERO_SHA="0000000000000000000000000000000000000000"
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [[ "$BEFORE" == "$ZERO_SHA" ]]; then
            if git rev-parse "${AFTER}^" >/dev/null 2>&1; then
              CHANGED_FILES="$(git diff --name-only "${AFTER}^" "$AFTER")"
            else
              CHANGED_FILES="$(git ls-tree --name-only -r "$AFTER")"
            fi
          else
            CHANGED_FILES="$(git diff --name-only "$BEFORE" "$AFTER")"
          fi

          if printf '%s\n' "$CHANGED_FILES" | grep -qE '^app/'; then
            echo "app_changed=true" >> "$GITHUB_OUTPUT"
            echo "Detected changes under app/**. Running image pipeline."
          else
            echo "app_changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes under app/**. Skipping image build, scan, and digest pin."
          fi

      - name: Normalise image repo (lowercase owner)
        id: img
        if: steps.changes.outputs.app_changed == 'true'
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image_repo=ghcr.io/${OWNER_LOWER}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        if: steps.changes.outputs.app_changed == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.image_repo }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short,prefix=sha-

      - if: steps.changes.outputs.app_changed == 'true'
        uses: docker/setup-qemu-action@v3
      - if: steps.changes.outputs.app_changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.changes.outputs.app_changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        id: build
        if: steps.changes.outputs.app_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: app
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ steps.img.outputs.image_repo }}:buildcache
          cache-to:   type=registry,ref=${{ steps.img.outputs.image_repo }}:buildcache,mode=max

  trivy:
    runs-on: ubuntu-latest
    needs: push
    if: needs.push.outputs.app_changed == 'true'
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ needs.push.outputs.image }}@${{ needs.push.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  pin-digest:
    runs-on: ubuntu-latest
    needs: [push, trivy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]' && needs.push.outputs.app_changed == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Kustomize image digest
        env:
          DIGEST: ${{ needs.push.outputs.digest }}
          FILE: infra/apps/workloads/player-data-service/overlays/dev/kustomization.yaml
        run: |
          grep -qE '^[[:space:]]*digest:' "$FILE"
          sed -i -E "s|(^[[:space:]]*digest:[[:space:]]*).*$|\1${DIGEST}|" "$FILE"

          if git diff --quiet -- "$FILE"; then
            echo "Manifest already pinned to ${DIGEST}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "chore(deploy): pin player-data-service digest [skip ci]"
          git push
